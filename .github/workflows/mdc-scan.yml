name: MDC Security Scan + Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@latest
        id: msdo

      - name: Upload SARIF results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push chat-api
        uses: docker/build-push-action@v5
        with:
          context: ./chat-api
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/chat-api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/chat-api:latest

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/nginx-proxy:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/nginx-proxy:latest
